<!doctype html>
<html lang="cs" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBM Editor</title>
  </head>
  <body class="h-full bg-slate-950 flex flex-col overflow-hidden">
    <!-- Header -->
    <header
      class="flex items-center gap-3 px-5 py-2.5 bg-slate-800 text-white shadow shrink-0"
    >
      <span class="text-base font-bold tracking-tight">CBM Editor</span>
      <span class="text-slate-400 text-sm">Content Block Markup</span>
      <div class="ml-auto">
        <button
          id="btn-download"
          class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white transition"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="w-4 h-4"
          >
            <path
              d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"
            />
            <path
              d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"
            />
          </svg>
          Stáhnout .txt
        </button>
      </div>
    </header>

    <!-- Panel labels -->
    <div class="flex shrink-0 border-b border-slate-700 bg-slate-900">
      <div
        class="flex-1 flex items-center gap-2 px-5 py-2 border-r border-slate-700 text-xs font-semibold text-slate-400 uppercase tracking-wider"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="w-4 h-4"
        >
          <path
            fill-rule="evenodd"
            d="M6.28 5.22a.75.75 0 0 1 0 1.06L2.56 10l3.72 3.72a.75.75 0 0 1-1.06 1.06L.97 10.53a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Zm7.44 0a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L17.44 10l-3.72-3.72a.75.75 0 0 1 0-1.06ZM11.377 2.011a.75.75 0 0 1 .612.867l-2.5 14.5a.75.75 0 0 1-1.478-.255l2.5-14.5a.75.75 0 0 1 .866-.612Z"
            clip-rule="evenodd"
          />
        </svg>
        Textový editor
      </div>
      <div
        class="flex-1 flex items-center gap-2 px-5 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="w-4 h-4"
        >
          <path
            fill-rule="evenodd"
            d="M2 4.75A.75.75 0 0 1 2.75 4h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 4.75ZM2 10a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 10Zm0 5.25a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1-.75-.75Z"
            clip-rule="evenodd"
          />
        </svg>
        Formulářový builder
      </div>
    </div>

    <!-- Split panels -->
    <div class="flex flex-1 overflow-hidden">
      <div
        id="editor"
        class="flex-1 overflow-auto border-r border-slate-700"
      ></div>
      <div id="form-builder" class="flex-1 overflow-hidden bg-slate-900"></div>
    </div>

    <!-- Drop overlay -->
    <div
      id="drop-overlay"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm pointer-events-none"
    >
      <div
        class="flex flex-col items-center gap-3 px-10 py-8 rounded-2xl border-2 border-dashed border-blue-400 bg-slate-900/90"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="w-10 h-10 text-blue-400"
        >
          <path
            d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"
          />
          <path
            d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"
          />
        </svg>
        <p class="text-blue-300 font-semibold text-sm">
          Pustit soubor pro načtení
        </p>
        <p class="text-slate-500 text-xs">.txt nebo .cbm</p>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
